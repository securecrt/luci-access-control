name: Build OpenWrt Package

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt target version'
        required: true
        default: '25.12.4'
        type: string
      create_release:
        description: 'Create a Draft Release on GitHub?'
        required: true
        default: 'false'
        type: boolean
      release_tag:
        description: 'Release tag name (if creating release)'
        required: false
        default: 'v0.4.4'
        type: string

env:
  DEFAULT_OPENWRT_VERSION: '25.12.4'

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-${{ github.event.inputs.openwrt_version || env.DEFAULT_OPENWRT_VERSION }}
          INDEX: 1
          BUILD_LOG: 1

      - name: Rename packages to include _all suffix
        run: |
          if [ -d bin/packages ]; then
            find bin/packages/ -type f \( -name "*.apk" -o -name "*.ipk" \) | while read file; do
              if [[ "$file" != *"_all"* ]]; then
                dir=$(dirname "$file")
                base=$(basename "$file")
                ext="${base##*.}"
                name="${base%.*}"
                mv "$file" "$dir/${name}_all.${ext}"
              fi
            done
          fi

      - name: Store package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-all-${{ github.event.inputs.openwrt_version || env.DEFAULT_OPENWRT_VERSION }}
          path: |
            bin/packages/**/*access-control*.ipk
            bin/packages/**/*access-control*.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == true) }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: packages
          pattern: packages-*
          merge-multiple: true

      - name: List package files
        run: |
          ls -R packages

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/**/*.ipk
            packages/**/*.apk
          tag_name: ${{ github.ref_name || github.event.inputs.release_tag || 'latest' }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
