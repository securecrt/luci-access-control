name: Build OpenWrt Package

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt target version'
        required: true
        default: '25.12.4'
        type: string
      create_release:
        description: 'Create a Draft Release on GitHub?'
        required: true
        default: 'false'
        type: boolean
      release_tag:
        description: 'Release tag name (if creating release)'
        required: false
        default: 'v0.4.4'
        type: string

env:
  DEFAULT_OPENWRT_VERSION: '25.12.4'

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-${{ github.event.inputs.openwrt_version || env.DEFAULT_OPENWRT_VERSION }}
          PACKAGES: luci-app-access-control
          INDEX: 1
          BUILD_LOG: 1
          PRIVATE_KEY: ${{ secrets.APK_SIGNING_KEY }}

      - name: Store package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: packages-all-${{ github.event.inputs.openwrt_version || env.DEFAULT_OPENWRT_VERSION }}
          path: |
            bin/packages/**/*access-control*.ipk
            bin/packages/**/*access-control*.apk

      - name: Sign APK index (fallback - re-sign with apk adbsign)
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          if [ -n "$APK_SIGNING_KEY" ]; then
            docker run --rm -v "$PWD":/workspace -w /workspace -e APK_SIGNING_KEY="$APK_SIGNING_KEY" alpine:latest sh -c '
              apk add --no-cache apk-tools &&
              echo "$APK_SIGNING_KEY" > /tmp/signing.key &&
              chmod 600 /tmp/signing.key &&
              find /workspace/bin/packages/ -name "packages.adb" | while read f; do
                echo "Re-signing: $f"
                apk adbsign --sign-key /tmp/signing.key "$f" && echo "OK: $f" || echo "WARN: failed $f"
              done
              rm -f /tmp/signing.key
            '
          else
            echo "Warning: APK_SIGNING_KEY not set, skipping re-sign."
          fi

      - name: Copy keys for deployment
        run: |
          if [ -d keys ]; then
            cp -r keys ./bin/packages/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bin/packages
          publish_branch: gh-pages
          force_orphan: true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: packages
          pattern: packages-*
          merge-multiple: true

      - name: List package files
        run: |
          ls -R packages

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/**/*.ipk
            packages/**/*.apk
          tag_name: ${{ github.ref_name || github.event.inputs.release_tag || 'latest' }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
