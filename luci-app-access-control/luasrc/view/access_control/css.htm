<script type="text/javascript">
function updateLuciWeekdays(cbid) {
    var days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    var selected = [];
    var allChecked = true;
    var noneChecked = true;
    for (var i = 0; i < days.length; i++) {
        var cb = document.getElementById(cbid + '_' + days[i]);
        if (cb && cb.checked) {
            selected.push(days[i]);
            noneChecked = false;
        } else {
            allChecked = false;
        }
    }
    var input = document.getElementById(cbid);
    if (input) {
        if (allChecked || noneChecked) {
            input.value = '';
        } else {
            input.value = selected.join(' ');
        }
        if (typeof cbi_d_update === 'function') {
            cbi_d_update(cbid);
        }
    }
}

(function() {
    function mapTableLabels() {
        var tables = document.querySelectorAll('.cbi-section-table, .table');
        tables.forEach(function(table) {
            var headers = [];
            var ths = table.querySelectorAll('tr.cbi-section-table-titles th, .cbi-section-table-titles .th, .cbi-section-table-titles .cbi-section-table-cell, .thead .th, .thead .td');
            ths.forEach(function(th) {
                headers.push(th.textContent.trim());
            });
            
            var rows = table.querySelectorAll('tr.cbi-section-table-row, .cbi-section-table-row, .tr');
            rows.forEach(function(row) {
                if (row.classList.contains('cbi-section-table-titles') || row.classList.contains('thead')) {
                    return;
                }
                var tds = row.querySelectorAll('td.cbi-value-field, td.cbi-section-table-cell, td.cbi-section-table-descr, .cbi-value-field, .cbi-section-table-cell, .td');
                tds.forEach(function(td, index) {
                    if (headers[index]) {
                        td.setAttribute('data-label', headers[index]);
                    }
                });
            });
        });
    }

    mapTableLabels();
    window.addEventListener('DOMContentLoaded', mapTableLabels);
    window.addEventListener('load', mapTableLabels);

    var observer = new MutationObserver(function(mutations) {
        var run = false;
        mutations.forEach(function(mutation) {
            if (mutation.addedNodes && mutation.addedNodes.length > 0) {
                run = true;
            }
        });
        if (run) {
            mapTableLabels();
        }
    });
    
    function initObserver() {
        var target = document.querySelector('.cbi-map') || document.body;
        if (target) {
            observer.observe(target, { childList: true, subtree: true });
        }
    }
    
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', initObserver);
    } else {
        initObserver();
    }
})();
</script>
